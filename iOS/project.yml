name: Gradpath
options:
  bundleIdPrefix: com.shimondeitel
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    DEVELOPMENT_TEAM: W7Q885Q59C
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
targets:
  Gradpath:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Gradpath
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.gradpath
        DEVELOPMENT_TEAM: W7Q885Q59C
        INFOPLIST_FILE: Gradpath/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: false
    info:
      path: Gradpath/Info.plist
      properties:
        UILaunchScreen: {}
        CFBundleDisplayName: Gradpath
        ITSAppUsesNonExemptEncryption: false
    entitlements:
      path: Gradpath/Gradpath.entitlements
      properties: {}
  GradpathTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: GradpathTests
    dependencies:
      - target: Gradpath
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.gradpath.tests
        DEVELOPMENT_TEAM: W7Q885Q59C
  GradpathUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: GradpathUITests
    dependencies:
      - target: Gradpath
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.gradpath.uitests
        DEVELOPMENT_TEAM: W7Q885Q59C
schemes:
  Gradpath:
    build:
      targets:
        Gradpath: all
    test:
      targets:
        - GradpathTests
        - GradpathUITests
    run:
      config: Debug
